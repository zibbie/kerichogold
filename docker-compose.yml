services:
  app:
    container_name: kericho-app
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    networks:
      - kericho-network
    depends_on:
      - db
      - redis

  queue:
    container_name: kericho-queue
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=production
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    networks:
      - kericho-network
    depends_on:
      - db
      - redis
      - app

  redis:
    image: redis:alpine
    container_name: kericho-redis
    networks:
      - kericho-network
    ports:
      - "6380:6379"

  web:
    container_name: kericho-web
    image: nginx:alpine
    expose:
      - "80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./storage/logs/nginx:/var/log/nginx
    networks:
      - kericho-network
    depends_on:
      - app

  nginx-proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: kericho-proxy
    restart: always
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    environment:
      - INITIAL_ADMIN_EMAIL=admin@example.com
      - INITIAL_ADMIN_PASSWORD=changeme
    volumes:
      - ./docker/proxy/data:/data
      - ./docker/proxy/letsencrypt:/etc/letsencrypt
    networks:
      - kericho-network

  db:
    container_name: kericho-db
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${DB_DATABASE:-kericho_v2}
      - POSTGRES_USER=${DB_USERNAME:-kericho}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - kericho-db-data:/var/lib/postgresql/data
    networks:
      - kericho-network

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: kericho-meilisearch
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_KEY:-masterKey}
      - MEILI_NO_ANALYTICS=true
      - MEILI_ENV=production
    volumes:
      - kericho-meilisearch-data:/meili_data
    networks:
      - kericho-network

networks:
  kericho-network:
    driver: bridge
    name: kericho-network

volumes:
  kericho-db-data:
  kericho-meilisearch-data:

