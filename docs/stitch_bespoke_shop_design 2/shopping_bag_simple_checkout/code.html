<div>

<button aria-label="Remove item" class="text-outline hover:text-error transition-colors p-1">
<span class="material-symbols-outlined text-[20px]" data-icon="delete">delete</span>
</button>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant">Medium • Nursery Pot</p>

<div class="flex justify-between items-end">
<span class="font-label-md text-label-md text-on-background">$45.00</span>

<span class="material-symbols-outlined text-[18px]" data-icon="remove">remove</span>
</button>
<span class="w-8 text-center font-body-sm text-body-sm text-on-background">1</span>

<span class="material-symbols-outlined text-[18px]" data-icon="add">add</span>

</div>
</div>
</div>
</div>

<span class="material-symbols-outlined text-[18px]" data-icon="add">add</span>

</div>
</div>
</div>
